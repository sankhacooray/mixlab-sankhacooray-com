<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MixLab — Drink Innovation System</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0c;
  --surface: #131318;
  --surface2: #1a1a22;
  --surface3: #22222e;
  --border: #2a2a38;
  --text: #e8e6f0;
  --text-dim: #8886a0;
  --text-muted: #5a587a;
  --accent: #a6e36f;
  --accent-dim: #7ab84a;
  --danger: #ff6b6b;
  --danger-bg: rgba(255,107,107,0.08);
  --danger-border: rgba(255,107,107,0.2);
  --warn: #ffb347;
  --warn-bg: rgba(255,179,71,0.08);
  --warn-border: rgba(255,179,71,0.2);
  --good: #6bdfb8;
  --good-bg: rgba(107,223,184,0.08);
  --good-border: rgba(107,223,184,0.2);
  --info: #7eb8ff;
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Header */
.header {
  padding: 24px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(166,227,111,0.03) 0%, transparent 100%);
}
.logo {
  font-family: 'Instrument Serif', serif;
  font-size: 32px;
  color: var(--accent);
  letter-spacing: -0.5px;
}
.logo span { color: var(--text-dim); font-weight: 300; }
.tagline { color: var(--text-muted); font-size: 13px; margin-left: auto; }

/* Layout */
.app {
  display: grid;
  grid-template-columns: 320px 1fr 380px;
  height: calc(100vh - 81px);
}

/* Ingredient Panel */
.panel-left {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
}
.panel-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  margin-bottom: 12px;
}

/* Search */
.search-box {
  position: relative;
}
.search-box input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px 10px 36px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box::before {
  content: '⌕';
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 16px;
}

/* Categories */
.categories {
  display: flex;
  gap: 6px;
  padding: 12px 20px;
  overflow-x: auto;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.cat-btn {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.cat-btn.active, .cat-btn:hover {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}

/* Ingredient List */
.ingredient-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.ingredient-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
}
.ingredient-item:hover {
  background: var(--surface2);
  border-color: var(--border);
}
.ing-emoji { font-size: 22px; width: 32px; text-align: center; }
.ing-info { flex: 1; min-width: 0; }
.ing-name { font-size: 13px; font-weight: 500; }
.ing-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.ing-add {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--accent);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.ing-add:hover {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}

/* Center / Glass Area */
.panel-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: radial-gradient(ellipse at 50% 80%, rgba(166,227,111,0.04) 0%, transparent 60%);
  overflow-y: auto;
  padding: 32px 24px;
}

.drink-type-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 28px;
}
.drink-type-btn {
  padding: 8px 20px;
  border-radius: 24px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.drink-type-btn.active {
  background: var(--surface3);
  color: var(--text);
  border-color: var(--accent);
}

/* Glass Visualization */
.glass-container {
  position: relative;
  width: 200px;
  margin-bottom: 28px;
}
.glass-svg { width: 100%; }

/* Mix Items */
.mix-area {
  width: 100%;
  max-width: 500px;
}
.mix-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.mix-items { display: flex; flex-direction: column; gap: 6px; }
.mix-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  animation: slideIn 0.25s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}
.mix-item .ing-emoji { font-size: 18px; width: 24px; }
.mix-item-name { font-size: 13px; flex: 1; }
.mix-qty {
  display: flex;
  align-items: center;
  gap: 4px;
}
.mix-qty button {
  width: 24px; height: 24px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-dim);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.mix-qty button:hover { border-color: var(--accent); color: var(--accent); }
.mix-qty-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  width: 50px;
  text-align: center;
  color: var(--text-dim);
}
.mix-remove {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
  transition: color 0.15s;
}
.mix-remove:hover { color: var(--danger); }

.empty-mix {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-muted);
  font-size: 13px;
  line-height: 1.8;
}
.empty-mix .big { font-size: 40px; margin-bottom: 12px; }

/* Right Panel - Analysis */
.panel-right {
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.analysis-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.analysis-section {
  margin-bottom: 24px;
}
.section-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Macros */
.macro-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.macro-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
}
.macro-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 500;
  color: var(--text);
}
.macro-unit { font-size: 11px; color: var(--text-muted); }
.macro-name { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* Compounds */
.compound-list { display: flex; flex-direction: column; gap: 4px; }
.compound-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: var(--surface);
  border-radius: 6px;
  font-size: 12px;
}
.compound-name { flex: 1; color: var(--text-dim); }
.compound-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text);
}
.compound-bar-wrap {
  width: 48px;
  height: 4px;
  background: var(--surface3);
  border-radius: 2px;
  overflow: hidden;
}
.compound-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* Alerts */
.alert-card {
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  font-size: 12px;
  line-height: 1.5;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.alert-card.danger { background: var(--danger-bg); border: 1px solid var(--danger-border); }
.alert-card.warn { background: var(--warn-bg); border: 1px solid var(--warn-border); }
.alert-card.good { background: var(--good-bg); border: 1px solid var(--good-border); }
.alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.alert-card.danger .alert-icon { color: var(--danger); }
.alert-card.warn .alert-icon { color: var(--warn); }
.alert-card.good .alert-icon { color: var(--good); }
.alert-text strong { display: block; margin-bottom: 2px; }
.alert-card.danger .alert-text strong { color: var(--danger); }
.alert-card.warn .alert-text strong { color: var(--warn); }
.alert-card.good .alert-text strong { color: var(--good); }

/* Benefit tags */
.benefit-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.benefit-tag {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  background: var(--good-bg);
  border: 1px solid var(--good-border);
  color: var(--good);
}

/* Empty state */
.analysis-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  font-size: 13px;
  text-align: center;
  padding: 40px;
  line-height: 1.8;
}

/* Responsive */
@media (max-width: 1100px) {
  .app { grid-template-columns: 280px 1fr 320px; }
}
@media (max-width: 860px) {
  .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; height: auto; }
  .panel-left, .panel-right { max-height: 50vh; }
  .header { padding: 16px 20px; }
  .tagline { display: none; }
}
</style>
</head>

// ====================== STATE ======================
const DRINK_TYPES = ['Smoothie','Yogurt Bowl','Coffee','Juice','Shake'];
let currentCategory = 'All';
let currentDrinkType = 'Smoothie';
let mix = []; // {id, qty} where qty is number of servings

// ====================== INIT ======================
function init() {
  renderCategories();
  renderIngredients();
  renderDrinkTypes();
  renderMix();
  renderGlass();
  renderAnalysis();
}

function renderCategories() {
  const cats = ['All', ...new Set(INGREDIENTS.map(i => i.cat))];
  document.getElementById('categories').innerHTML = cats.map(c =>
    `<button class="cat-btn ${c === currentCategory ? 'active' : ''}" onclick="setCategory('${c}')">${c}</button>`
  ).join('');
}

function setCategory(c) {
  currentCategory = c;
  renderCategories();
  renderIngredients();
}

function filterIngredients() { renderIngredients(); }

function renderIngredients() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let items = INGREDIENTS;
  if(currentCategory !== 'All') items = items.filter(i => i.cat === currentCategory);
  if(q) items = items.filter(i => i.name.toLowerCase().includes(q));

  document.getElementById('ingredientList').innerHTML = items.map(i => `
    <div class="ingredient-item" ondblclick="addToMix('${i.id}')">
      <div class="ing-emoji">${i.emoji}</div>
      <div class="ing-info">
        <div class="ing-name">${i.name}</div>
        <div class="ing-meta">${i.serving} · ${i.macros.cal} cal</div>
      </div>
      <button class="ing-add" onclick="addToMix('${i.id}')" title="Add to mix">+</button>
    </div>
  `).join('');
}

function renderDrinkTypes() {
  document.getElementById('drinkTypes').innerHTML = DRINK_TYPES.map(d =>
    `<button class="drink-type-btn ${d === currentDrinkType ? 'active' : ''}" onclick="setDrinkType('${d}')">${d}</button>`
  ).join('');
}

function setDrinkType(d) { currentDrinkType = d; renderDrinkTypes(); renderGlass(); }

// ====================== MIX MANAGEMENT ======================
function addToMix(id) {
  const existing = mix.find(m => m.id === id);
  if(existing) { existing.qty += 1; }
  else { mix.push({id, qty: 1}); }
  renderMix(); renderGlass(); renderAnalysis();
}

function removeFromMix(id) {
  mix = mix.filter(m => m.id !== id);
  renderMix(); renderGlass(); renderAnalysis();
}

function adjustQty(id, delta) {
  const item = mix.find(m => m.id === id);
  if(!item) return;
  item.qty = Math.max(0.25, Math.round((item.qty + delta) * 4) / 4);
  renderMix(); renderGlass(); renderAnalysis();
}

function getIng(id) { return INGREDIENTS.find(i => i.id === id); }

function renderMix() {
  const el = document.getElementById('mixItems');
  if(mix.length === 0) {
    el.innerHTML = `<div class="empty-mix"><div class="big">🧪</div>Add ingredients from the left panel<br>to start creating your drink</div>`;
    return;
  }
  el.innerHTML = mix.map(m => {
    const ing = getIng(m.id);
    return `<div class="mix-item">
      <div class="ing-emoji">${ing.emoji}</div>
      <div class="mix-item-name">${ing.name}</div>
      <div class="mix-qty">
        <button onclick="adjustQty('${m.id}',-0.25)">−</button>
        <span class="mix-qty-val">${m.qty}× ${ing.serving.split('(')[0].trim()}</span>
        <button onclick="adjustQty('${m.id}',0.25)">+</button>
      </div>
      <button class="mix-remove" onclick="removeFromMix('${m.id}')">✕</button>
    </div>`;
  }).join('');
}

// ====================== GLASS VISUALIZATION ======================
function renderGlass() {
  const container = document.getElementById('glassContainer');
  if(mix.length === 0) {
    container.innerHTML = `<svg viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="glassShine" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
          <stop offset="40%" stop-color="rgba(255,255,255,0.02)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0.06)"/>
        </linearGradient>
      </defs>
      <path d="M45,40 L35,280 Q35,300 55,300 L145,300 Q165,300 165,280 L155,40 Z"
        fill="url(#glassShine)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
      <text x="100" y="180" text-anchor="middle" fill="rgba(255,255,255,0.1)" font-size="40">🥤</text>
    </svg>`;
    return;
  }

  // Calculate blended color
  let totalG = 0;
  mix.forEach(m => { const ing = getIng(m.id); totalG += ing.g * m.qty; });

  let r=0, g=0, b=0;
  mix.forEach(m => {
    const ing = getIng(m.id);
    const weight = (ing.g * m.qty) / totalG;
    const c = hexToRgb(ing.color);
    r += c.r * weight;
    g += c.g * weight;
    b += c.b * weight;
  });
  const blendedColor = `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;
  const lighterColor = `rgb(${Math.min(255,Math.round(r*1.3))},${Math.min(255,Math.round(g*1.3))},${Math.min(255,Math.round(b*1.3))})`;
  const darkerColor = `rgb(${Math.round(r*0.6)},${Math.round(g*0.6)},${Math.round(b*0.6)})`;

  // Fill level based on total grams (max around 600g)
  const fillPct = Math.min(0.9, totalG / 600);
  const fillTop = 280 - fillPct * 240;

  // Calculate glass width at fill top
  const leftAtTop = 45 + (35 - 45) * ((fillTop - 40) / (280 - 40)); // actually let me recalc
  const lTop = 45 + (35-45) * (280-40 - (280-fillTop)) / (280-40);
  const rTop = 155 + (165-155) * (280-40 - (280-fillTop)) / (280-40);
  const lT = 45 - (45-35) * ((fillTop-40)/(280-40));
  const rT = 155 + (165-155) * ((fillTop-40)/(280-40));

  // Build layers for visual interest
  const layers = mix.map(m => {
    const ing = getIng(m.id);
    return { color: ing.color, weight: (ing.g * m.qty) / totalG, name: ing.name };
  });

  container.innerHTML = `<svg viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="drinkGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${lighterColor}"/>
        <stop offset="60%" stop-color="${blendedColor}"/>
        <stop offset="100%" stop-color="${darkerColor}"/>
      </linearGradient>
      <linearGradient id="glassShine2" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="rgba(255,255,255,0.1)"/>
        <stop offset="30%" stop-color="rgba(255,255,255,0.02)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0.07)"/>
      </linearGradient>
      <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <clipPath id="glassClip">
        <path d="M45,40 L35,280 Q35,300 55,300 L145,300 Q165,300 165,280 L155,40 Z"/>
      </clipPath>
    </defs>

    <!-- Liquid -->
    <g clip-path="url(#glassClip)">
      <rect x="20" y="${fillTop}" width="170" height="${300-fillTop}" fill="url(#drinkGrad)"/>
      <!-- Texture dots -->
      ${mix.map((m,i) => {
        const ing = getIng(m.id);
        let dots = '';
        const count = Math.min(8, Math.ceil(m.qty * 3));
        for(let d=0; d<count; d++) {
          const cx = 55 + Math.random()*90;
          const cy = fillTop + 10 + Math.random()*(280-fillTop-20);
          const cr = 2 + Math.random()*4;
          dots += `<circle cx="${cx}" cy="${cy}" r="${cr}" fill="${ing.color}" opacity="0.35"/>`;
        }
        return dots;
      }).join('')}
      <!-- Surface foam/froth line -->
      <ellipse cx="100" cy="${fillTop}" rx="60" ry="6" fill="${lighterColor}" opacity="0.5"/>
      <!-- Bubbles -->
      ${[...Array(6)].map((_,i) => {
        const cx = 60+Math.random()*80;
        const cy = fillTop+20+Math.random()*(250-fillTop);
        return `<circle cx="${cx}" cy="${cy}" r="${1+Math.random()*2}" fill="rgba(255,255,255,0.15)">
          <animate attributeName="cy" from="${cy}" to="${fillTop}" dur="${2+Math.random()*3}s" repeatCount="indefinite"/>
          <animate attributeName="opacity" from="0.15" to="0" dur="${2+Math.random()*3}s" repeatCount="indefinite"/>
        </circle>`;
      }).join('')}
    </g>

    <!-- Glass outline -->
    <path d="M45,40 L35,280 Q35,300 55,300 L145,300 Q165,300 165,280 L155,40 Z"
      fill="url(#glassShine2)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

    <!-- Straw -->
    <rect x="118" y="10" width="6" height="${Math.max(fillTop,60)+20}" rx="3"
      fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>

    <!-- Volume label -->
    <text x="100" y="${Math.max(30, fillTop-12)}" text-anchor="middle"
      font-family="JetBrains Mono, monospace" font-size="11" fill="rgba(255,255,255,0.5)">
      ${Math.round(totalG)}${totalG > 200 ? 'ml' : 'g'}
    </text>
  </svg>`;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

    el.innerHTML = `<div class="analysis-empty">

      Nutritional analysis will appear<br>here as you add ingredients

    return;

  // Compute totals
  const totals = { macros:{cal:0,protein:0,fat:0,carb:0,fiber:0,sugar:0}, micros:{}, compounds:{} };
  const allBenefits = new Set();
  const allWarnings = [];

  mix.forEach(m => {
    const ing = getIng(m.id);
    const q = m.qty;
    // Macros
    Object.keys(ing.macros).forEach(k => totals.macros[k] += ing.macros[k] * q);
    // Micros
    Object.keys(ing.micros).forEach(k => {
      totals.micros[k] = (totals.micros[k]||0) + ing.micros[k] * q;
    });
    // Compounds
    Object.keys(ing.compounds).forEach(k => {
      totals.compounds[k] = (totals.compounds[k]||0) + ing.compounds[k] * q;
    });
    // Benefits
    ing.benefits.forEach(b => allBenefits.add(b));
    // Warnings
    ing.warnings.forEach(w => allWarnings.push({...w, source: ing.name}));

  // Check interactions
  const activeInteractions = [];
  const compoundKeys = Object.keys(totals.compounds).filter(k => totals.compounds[k] > 0);

    ferulic:'Ferulic Acid', mct:'MCTs', capricAcid:'Capric Acid', resveratrol:'Resveratrol',
    pCoumaricAcid:'p-Coumaric Acid', coq10:'CoQ10', gla:'GLA', trigonelline:'Trigonelline',
    kahweol:'Kahweol', chrysin:'Chrysin', pinocembrin:'Pinocembrin',
    methylglyoxal:'Methylglyoxal', zeaxanthin:'Zeaxanthin', gallicAcid:'Gallic Acid',
    turmerone:'Turmerone', demethoxycurcumin:'Demethoxycurcumin', alphaTocopherol:'Alpha-Tocopherol',
    immunoglobulins:'Immunoglobulins', sdi:'SDI', probiotics:'Probiotics',
    casein:'Casein', wheyProtein:'Whey Protein', cla:'CLA', cytokinins:'Cytokinins',
    kaempferol:'Kaempferol', quebecol:'Quebecol', inulin:'Inulin',
    hydrogenPeroxide:'Hydrogen Peroxide', auxins:'Auxins', zingiberene:'Zingiberene',
  };

  // Micro display
  const MICRO_NAMES = {
    vitC:'Vitamin C', vitK:'Vitamin K', vitE:'Vitamin E', vitA:'Vitamin A', vitD:'Vitamin D',
    vitB6:'Vitamin B6', vitB12:'Vitamin B12', vitB3:'Niacin (B3)',
    folate:'Folate', calcium:'Calcium', iron:'Iron', potassium:'Potassium',
    magnesium:'Magnesium', manganese:'Manganese', zinc:'Zinc', copper:'Copper',
    phosphorus:'Phosphorus', sodium:'Sodium', thiamin:'Thiamin',
  };
  const MICRO_UNITS = {
    vitC:'mg', vitK:'µg', vitE:'mg', vitA:'µg', vitD:'µg', vitB6:'mg', vitB12:'µg', vitB3:'mg',
    folate:'µg', calcium:'mg', iron:'mg', potassium:'mg', magnesium:'mg', manganese:'mg',
    zinc:'mg', copper:'mg', phosphorus:'mg', sodium:'mg', thiamin:'mg',
  };
  // RDA for % bar
  const MICRO_RDA = {
    vitC:90, vitK:120, vitE:15, vitA:900, vitD:20, vitB6:1.7, vitB12:2.4, vitB3:16,
    folate:400, calcium:1000, iron:18, potassium:2600, magnesium:420, manganese:2.3,
    zinc:11, copper:0.9, phosphorus:700, sodium:2300, thiamin:1.2,
  };

  let html = '';

  // MACROS
  html += `<div class="analysis-section">
    <div class="section-label">⚡ Macronutrients</div>
    <div class="macro-grid">
      <div class="macro-card"><div class="macro-val">${Math.round(totals.macros.cal)}<span class="macro-unit"> kcal</span></div><div class="macro-name">Calories</div></div>
      <div class="macro-card"><div class="macro-val">${totals.macros.protein.toFixed(1)}<span class="macro-unit"> g</span></div><div class="macro-name">Protein</div></div>
      <div class="macro-card"><div class="macro-val">${totals.macros.fat.toFixed(1)}<span class="macro-unit"> g</span></div><div class="macro-name">Fat</div></div>
      <div class="macro-card"><div class="macro-val">${totals.macros.carb.toFixed(1)}<span class="macro-unit"> g</span></div><div class="macro-name">Carbs</div></div>
      <div class="macro-card"><div class="macro-val">${totals.macros.fiber.toFixed(1)}<span class="macro-unit"> g</span></div><div class="macro-name">Fiber</div></div>
      <div class="macro-card"><div class="macro-val">${totals.macros.sugar.toFixed(1)}<span class="macro-unit"> g</span></div><div class="macro-name">Sugar</div></div>
    </div>
  </div>`;

  // MICRONUTRIENTS
  const activeMicros = Object.keys(totals.micros).filter(k => totals.micros[k] > 0.01).sort((a,b) => {
    const pctA = (totals.micros[a] / (MICRO_RDA[a]||1)) * 100;
    const pctB = (totals.micros[b] / (MICRO_RDA[b]||1)) * 100;
    return pctB - pctA;
  });
  if(activeMicros.length) {
    html += `<div class="analysis-section">
      <div class="section-label">💊 Micronutrients</div>
      <div class="compound-list">${activeMicros.map(k => {
        const val = totals.micros[k];
        const pct = Math.min(100, (val / (MICRO_RDA[k]||1)) * 100);
        return `<div class="compound-row">
          <span class="compound-name">${MICRO_NAMES[k]||k}</span>
          <span class="compound-val">${val < 1 ? val.toFixed(2) : val.toFixed(1)} ${MICRO_UNITS[k]||''}</span>
          <div class="compound-bar-wrap"><div class="compound-bar" style="width:${pct}%;background:${pct>80?'var(--good)':pct>40?'var(--accent)':'var(--text-muted)'}"></div></div>
          <span class="compound-val" style="width:36px;text-align:right;color:${pct>80?'var(--good)':'var(--text-muted)'}">${Math.round(pct)}%</span>
        </div>`;
      }).join('')}</div>
    </div>`;
  }

  // KEY COMPOUNDS
  const activeCompounds = Object.keys(totals.compounds)
    .filter(k => totals.compounds[k] > 0.01)
    .sort((a,b) => totals.compounds[b] - totals.compounds[a])
    .slice(0, 12);
  if(activeCompounds.length) {
    const maxVal = Math.max(...activeCompounds.map(k => totals.compounds[k]));
    html += `<div class="analysis-section">
      <div class="section-label">🧬 Key Compounds</div>
      <div class="compound-list">${activeCompounds.map(k => {
        const val = totals.compounds[k];
        const pct = (val / maxVal) * 100;
        return `<div class="compound-row">
          <span class="compound-name">${COMPOUND_NAMES[k]||k}</span>
          <span class="compound-val">${val >= 1000 ? (val/1000).toFixed(1)+'g' : val >= 1 ? val.toFixed(1)+'mg' : (val*1000).toFixed(0)+'µg'}</span>
          <div class="compound-bar-wrap"><div class="compound-bar" style="width:${pct}%"></div></div>
        </div>`;
      }).join('')}</div>
    </div>`;
  }

  // INTERACTIONS
  if(activeInteractions.length) {
    html += `<div class="analysis-section">
      <div class="section-label">⚗️ Compound Interactions</div>
      ${activeInteractions.map(inter => `
        <div class="alert-card ${inter.type}">
          <div class="alert-icon">${inter.type==='good'?'✦':'⚠'}</div>
          <div class="alert-text"><strong>${inter.title}</strong>${inter.msg}</div>
        </div>
      `).join('')}
    </div>`;
  }

  // WARNINGS
  if(allWarnings.length) {
    html += `<div class="analysis-section">
      <div class="section-label">🚨 Condition Alerts</div>
      ${allWarnings.map(w => `
        <div class="alert-card ${w.type}">
          <div class="alert-icon">${w.type==='danger'?'🛑':'⚠'}</div>
          <div class="alert-text"><strong>${w.cond}</strong>${w.note}<br><span style="opacity:0.6;font-size:11px">from ${w.source}</span></div>
        </div>
      `).join('')}
    </div>`;
  }

  // DISEASE IMPACT
  if(diseaseAlerts.length) {
    html += `<div class="analysis-section">
      <div class="section-label">🏥 Health Condition Impact</div>
      ${diseaseAlerts.map(da => `
        <div style="margin-bottom:10px">
          <div style="font-size:12px;font-weight:600;margin-bottom:6px;color:var(--text)">${da.condition}</div>
          ${da.flags.map(f => `<div class="alert-card warn" style="margin-bottom:4px"><div class="alert-icon">⚠</div><div class="alert-text">${f}</div></div>`).join('')}
          ${da.positives.map(p => `<div class="alert-card good" style="margin-bottom:4px"><div class="alert-icon">✦</div><div class="alert-text">${p}</div></div>`).join('')}
        </div>
      `).join('')}
    </div>`;
  }

  // BENEFITS
  if(allBenefits.size) {
    html += `<div class="analysis-section">
      <div class="section-label">✨ Combined Benefits</div>
      <div class="benefit-tags">${[...allBenefits].map(b => `<span class="benefit-tag">${b}</span>`).join('')}</div>
    </div>`;
  }

  el.innerHTML = html;
}

// Boot
init();
</script>
</body>
</html>
